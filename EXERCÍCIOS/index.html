<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/styles/style.css">
    <title>TechFood - Bebidas</title>
</head>
<body>

    <header class="header">
        <h1 class="logo">TechFood</h1>
        <button class="icon-btn" aria-label="Buscar produtos">🔍</button>
        <button class="icon-btn" aria-label="Abrir carrinho de compras">🛒</button>
    </header>

    <nav class="abas-lista" aria-label="Categorias do menu">
        <a href="massas.html" class="nav-link">Massas</a>
        <a href="bebidas.html" class="nav-link">Bebidas</a>
        <a href="doces.html" class="nav-link">Doces</a>
    </nav>

    <main class="menu-container">
        <section class="aba-tela" id="tela-bebidas" aria-labelledby="titulo-bebidas">
            <div class="grid-produtos">
                <article class="card">
                    <img src="src/img/suco.jng" alt="Copo de suco natural de laranja">
                    <h3>Suco Natural de Laranja</h3>
                    <p>Feito com laranjas frescas da estação.</p>
                    <span class="preco" aria-label="Preço: dez reais">R$ 10,00</span>
                    <button class="btn-pedir" aria-label="Adicionar suco de laranja ao carrinho">Pedir</button>
                </article>
            </div>
        </section>
    </main>

    <footer class="rodape">
        <p>Siga-nos:</p>
        <button aria-label="Acessar Facebook">FB</button>
        <button aria-label="Acessar Instagram">IG</button>
    </footer>

</body>
</html>
